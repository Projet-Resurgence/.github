name: "Question / Support"
description: "Ask a question or request support"
title: "[Question]: "
labels: ["question"]
body:
  - type: dropdown
    id: project
    attributes:
      label: Related Project
      description: Which project is your question about?
      options:
        - General / Infrastructure
        - PR_API
        - PAPA
        - Game-Dashboard
        - TechPanel
        - WebCalculator
        - Kanbanizer
        - OnlineMap
        - LLM_api
        - WebAuth-Handler
        - resurgence-web
        - CLEA (bot)
        - MARC (bot)
        - bots/commons
        - DocsHub
        - MapLib
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What have you tried so far? Any relevant logs or screenshots?
