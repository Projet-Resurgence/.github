name: "Bug Report"
description: "Report a bug to help us improve"
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which project is affected?
      options:
        - PR_API
        - PAPA
        - Game-Dashboard
        - TechPanel
        - WebCalculator
        - Kanbanizer
        - OnlineMap
        - LLM_api
        - WebAuth-Handler
        - resurgence-web
        - CLEA (bot)
        - MARC (bot)
        - bots/commons
        - DocsHub
        - MapLib
        - Docker/Infrastructure
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: What version or commit hash are you running?
      placeholder: e.g., abc1234 or v1.2.0
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How do we reproduce this behavior?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant logs, error messages, or screenshots.
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic/minor)
        - Medium (annoying but workaround exists)
        - High (core feature broken)
        - Critical (data loss / security issue)
    validations:
      required: true
