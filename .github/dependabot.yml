version: 2

updates:
  # Python dependencies for all services
  - package-ecosystem: "pip"
    directory: "/PR_API/src"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    reviewers:
      - "Projet-Resurgence/admins"
    labels:
      - "dependencies"
      - "python"
      - "security"
    commit-message:
      prefix: "deps(pr-api)"
    groups:
      flask-ecosystem:
        patterns:
          - "Flask*"
          - "Werkzeug"
          - "gunicorn"
      sqlalchemy-ecosystem:
        patterns:
          - "SQLAlchemy"
          - "alembic"
          - "psycopg2*"

  - package-ecosystem: "pip"
    directory: "/Game-Dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(game-dashboard)"

