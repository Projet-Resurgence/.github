name: Dependency Review

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review (GitHub Native)
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

      - name: Python — Safety check
        if: hashFiles('**/requirements.txt') != ''
        run: |
          pip install safety
          for f in $(find . -name "requirements.txt" -not -path "*/llama.cpp/*" -not -path "*/node_modules/*"); do
            echo "::group::Safety check: $f"
            safety check -r "$f" --json || true
            echo "::endgroup::"
          done

      - name: Node — Audit
        if: hashFiles('**/package-lock.json') != '' || hashFiles('**/package.json') != ''
        run: |
          for d in $(find . -name "package.json" -not -path "*/llama.cpp/*" -not -path "*/node_modules/*" -exec dirname {} \;); do
            echo "::group::npm audit: $d"
            (cd "$d" && [ -f package-lock.json ] && npm audit --audit-level=high || echo "No lockfile, skipping")
            echo "::endgroup::"
          done
