name: Build & Test

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  detect-and-build:
    name: Detect Stack & Build
    runs-on: ubuntu-latest
    outputs:
      stack: ${{ steps.detect.outputs.stack }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect project type
        id: detect
        run: |
          STACK="unknown"
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ] || [ -f "Pipfile" ]; then
            STACK="python"
          elif [ -f "package.json" ]; then
            STACK="node"
          elif [ -f "CMakeLists.txt" ] || [ -f "Makefile" ]; then
            STACK="cmake"
          elif [ -f "Cargo.toml" ]; then
            STACK="rust"
          elif [ -f "go.mod" ]; then
            STACK="go"
          elif [ -f "Gemfile" ]; then
            STACK="ruby"
          fi
          echo "stack=$STACK" >> "$GITHUB_OUTPUT"
          echo "Detected stack: $STACK"

      - name: Setup Python
        if: steps.detect.outputs.stack == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node.js
        if: steps.detect.outputs.stack == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        if: steps.detect.outputs.stack == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Go
        if: steps.detect.outputs.stack == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      # ── Python ──────────────────────────────────────────────
      - name: Python — Install deps
        if: steps.detect.outputs.stack == 'python'
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install flake8 pytest

      - name: Python — Lint
        if: steps.detect.outputs.stack == 'python'
        run: |
          # Skip if only requirements files exist
          py_files=$(find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*" -not -path "*/node_modules/*" | head -20)
          if [ -n "$py_files" ]; then
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
              --exclude venv,.venv,node_modules,__pycache__,.git
          fi

      - name: Python — Syntax check
        if: steps.detect.outputs.stack == 'python'
        run: |
          find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*" -not -path "*/node_modules/*" -not -path "*/__pycache__/*" -exec python -m py_compile {} +

      - name: Python — Tests
        if: steps.detect.outputs.stack == 'python'
        run: |
          if [ -d tests ] || ls test_*.py 1>/dev/null 2>&1 || ls *_test.py 1>/dev/null 2>&1; then
            pytest -v --tb=short
          else
            echo "No tests found, skipping pytest"
          fi

      # ── Node.js / React ─────────────────────────────────────
      - name: Node — Install deps
        if: steps.detect.outputs.stack == 'node'
        run: npm ci

      - name: Node — Lint
        if: steps.detect.outputs.stack == 'node'
        run: |
          if npm run lint --if-present 2>/dev/null; then
            echo "Lint passed"
          else
            echo "No lint script or lint failed"
          fi

      - name: Node — Type check
        if: steps.detect.outputs.stack == 'node'
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit || echo "Type check issues found (non-blocking)"
          fi

      - name: Node — Build
        if: steps.detect.outputs.stack == 'node'
        run: |
          if npm run build --if-present 2>/dev/null; then
            echo "Build successful"
          else
            echo "No build script found"
          fi

      - name: Node — Tests
        if: steps.detect.outputs.stack == 'node'
        run: |
          if npm test --if-present 2>/dev/null; then
            echo "Tests passed"
          else
            echo "No test script or tests skipped"
          fi

      # ── CMake / C++ ─────────────────────────────────────────
      - name: CMake — Configure
        if: steps.detect.outputs.stack == 'cmake'
        run: |
          mkdir -p build && cd build
          if [ -f ../CMakeLists.txt ]; then
            cmake .. -DCMAKE_BUILD_TYPE=Release
          elif [ -f ../Makefile ]; then
            echo "Makefile found, skipping cmake"
          fi

      - name: CMake — Build
        if: steps.detect.outputs.stack == 'cmake'
        run: |
          cd build
          if [ -f CMakeCache.txt ]; then
            cmake --build . --parallel $(nproc)
          elif [ -f ../Makefile ]; then
            cd .. && make -j$(nproc)
          fi

      # ── Rust ────────────────────────────────────────────────
      - name: Rust — Check
        if: steps.detect.outputs.stack == 'rust'
        run: cargo check

      - name: Rust — Tests
        if: steps.detect.outputs.stack == 'rust'
        run: cargo test

      # ── Go ──────────────────────────────────────────────────
      - name: Go — Build
        if: steps.detect.outputs.stack == 'go'
        run: go build ./...

      - name: Go — Tests
        if: steps.detect.outputs.stack == 'go'
        run: go test ./...

      # ── Fallback ────────────────────────────────────────────
      - name: Unknown stack
        if: steps.detect.outputs.stack == 'unknown'
        run: echo "No recognized build system found. Skipping build."
